services:
  ollama:
    container_name: ollama
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    mem_limit: 10g      # Limit memory to 10GB
    cpus: 10.0          # Limit CPU to 10 core

  infra-assistant:
    container_name: infra-assistant
    build: .
    ports:
      - "8081:8081"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - OLLAMA_BASE_URL=http://ollama:11434
      - REPO_PATH=${REPO_PATH:-/repo}
      - HOST_REPO_PATH=${HOST_REPO_PATH:-.}
      - VSCODE_MCP_JSON_PATH=${VSCODE_MCP_JSON_PATH:-/workspace/.vscode/mcp.json}
      - VSCODE_MCP_SERVER_NAME=${VSCODE_MCP_SERVER_NAME:-local-infra-assistant}
    restart: unless-stopped 
    volumes:
      - ${HOST_REPO_PATH:-.}:${REPO_PATH:-/repo}:ro
      - ${HOST_REPO_ROOT:-..}:/repos:ro
      - ./.vscode:/workspace/.vscode:ro
      - langchain_data:/app/data
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 2g      # Limit memory to 2GB
    cpus: 1.0          # Limit CPU to 1.0 core
# Stack Volumes      
volumes:
  langchain_data:
  ollama: